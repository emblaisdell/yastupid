<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<meta name="theme-color" content="#e3d8bb" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="mobile-web-app-capable" content="yes" />
<title>Ya Stupid</title>
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Ccircle cx='16' cy='16' r='15' fill='%23e24d36'/%3E%3Ctext x='16' y='23' font-size='16' font-weight='bold' text-anchor='middle' fill='%23fff' font-family='Trebuchet MS,sans-serif'%3E21%3C/text%3E%3C/svg%3E" />
<link rel="stylesheet" href="css/style.css" />
</head>
<body>
<canvas id="board"></canvas>

<!-- minimal in-game HUD -->
<button id="menuBtn" class="icon-btn gray" aria-label="Menu">☰</button>

<div id="goal" class="plaque">
  <span class="goal-num">Make <b id="targetVal">—</b></span>
  <span class="goal-label">one ball</span>
</div>

<button id="newBtn" class="icon-btn blue" aria-label="New level">↻</button>

<div id="readout" class="readout"><b id="moveVal">0</b> moves</div>

<div id="legend" class="legend hidden"></div>

<div id="toast" class="toast"></div>

<!-- compact menu / help popover -->
<div id="menu" class="scrim hidden">
  <div class="card">
    <button id="closeMenu" class="x" aria-label="Close">✕</button>
    <h1 class="title">Ya&nbsp;Stupid</h1>
    <p class="sub">because <b>9&nbsp;+&nbsp;10&nbsp;=&nbsp;21</b>, obviously.</p>

    <div class="seg" id="modeSeg">
      <button class="seg-btn" data-mode="classic">Classic</button>
      <button class="seg-btn" data-mode="advanced">Advanced</button>
    </div>

    <div id="helpBody" class="help"></div>

    <div class="card-actions">
      <button id="restartBtn" class="btn gray">Restart this one</button>
      <button id="newMenuBtn" class="btn">New level</button>
    </div>
  </div>
</div>

<!-- win popover -->
<div id="win" class="scrim hidden">
  <div class="card win-card">
    <h2 id="winTitle">Ya stupid, but ya winning!</h2>
    <p id="winLine" class="sub"></p>
    <button id="againBtn" class="btn">Next number →</button>
  </div>
</div>

<script src="js/game.js"></script>
</body>
</html>
